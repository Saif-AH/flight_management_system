services:
  postgres:
    image: postgres:16-alpine
    container_name: flightmanagement-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flightdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flightdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: src/Presentation/Dockerfile
    container_name: flightmanagement-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=flightdb;Username=postgres;Password=1234
      Jwt__Issuer: FlightManagementSystem
      Jwt__Audience: FlightManagementSystemUsers
      Jwt__Key: THIS_IS_A_SUPER_SECRET_KEY_CHANGE_IT_123456789
      Jwt__AccessTokenMinutes: 30
      Jwt__RefreshTokenDays: 7
      AllowedOrigins__0: http://localhost:5173
    ports:
      - "5105:8080"

volumes:
  postgres_data:
